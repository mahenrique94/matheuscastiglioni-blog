<ul class="nav__links" role="list">
    {{ range hugo.Data.menu }}{{ if .name }}
    <li class="nav__item">
        <a class="nav__link" href="/categoria/{{ .slug }}/">{{ .name }}</a>
    </li>
    {{ end }}{{ end }}
</ul>
<button class="nav__burger" id="navBurger" aria-label="Abrir menu" aria-expanded="false" type="button">
    <span></span>
    <span></span>
    <span></span>
</button>
<div class="nav__mobile" id="navMobile" role="navigation" aria-label="Menu mobile">
    <ul class="nav__mobile-list" role="list">
        {{ range hugo.Data.menu }}{{ if .name }}
        <li>
            <a class="nav__mobile-link" href="/categoria/{{ .slug }}/">{{ .name }}</a>
        </li>
        {{ end }}{{ end }}
    </ul>
</div>
